apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: nginx
          image: snowbobr/my-website:ee869b9562b07a0a80d8af2a4fa83fe326ce74bf
          ports:
            - containerPort: 80