apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: nginx
          image: snowbobr/my-website:67c44401b9bacabca9f87bf58f659c13a7a471a6
          ports:
            - containerPort: 80