apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: nginx
          image: snowbobr/my-website:49017219b0d9a6a0864e5051cdea3a2461311223
          ports:
            - containerPort: 80