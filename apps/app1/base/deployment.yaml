apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: nginx
          image: snowbobr/my-website:bd380a8843b855b28533b14ad980d66c201d0dac
          ports:
            - containerPort: 80